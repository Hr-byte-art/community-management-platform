server:
  port: 8080

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/community_service?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: zjrwjh999
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    # password:  # 如果Redis设置了密码，需要在这里配置

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.community.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: community-service-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000

# 文件上传路径配置
file:
  upload:
    path: ${user.dir}/uploads/

logging:
  level:
    com.community: debug
