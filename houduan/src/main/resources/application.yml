server:
  port: 8080
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  profiles:
    active: local

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.community.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: community-service-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000

# 文件上传路径配置
file:
  upload:
    path: ${user.dir}/uploads/

logging:
  level:
    com.community: info
